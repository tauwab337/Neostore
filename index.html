<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoStore Pro - Premium 3D Marketplace</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Three.js + GLTF Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-cyan: #00ffff;
            --primary-magenta: #ff00ff;
            --dark-bg: #0a0a1a;
            --card-bg: rgba(10, 10, 26, 0.9);
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: radial-gradient(ellipse at center, var(--dark-bg) 0%, #000000 70%);
            color: var(--primary-cyan);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px var(--primary-cyan); }
            100% { text-shadow: 0 0 30px var(--primary-magenta); }
        }

        @keyframes logoPulse {
            0% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); }
            100% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.8); }
        }

        /* Logo Animation */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-magenta));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            animation: logoPulse 2s ease-in-out infinite alternate;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--primary-cyan);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid var(--primary-cyan);
        }

        .cart-badge {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary-magenta);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            justify-content: center;
        }

        /* Auth Modal */
        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .auth-form {
            background: var(--card-bg);
            border: 2px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 50px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .auth-form h2 {
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .auth-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--primary-cyan);
            border-radius: 10px;
            color: var(--primary-cyan);
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
        }

        .auth-form input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        .auth-form input:focus {
            outline: none;
            box-shadow: 0 0 20px var(--primary-cyan);
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -500px;
            width: 500px;
            height: 100vh;
            background: var(--card-bg);
            border-left: 2px solid var(--primary-cyan);
            z-index: 1500;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 30px;
            border-bottom: 1px solid var(--primary-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.5rem;
        }

        .cart-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item h4 {
            margin-bottom: 5px;
        }

        .cart-item-price {
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .cart-item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .checkout-section {
            padding: 30px;
            border-top: 2px solid var(--primary-magenta);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .cart-total-label {
            font-size: 1rem;
        }

        .cart-total-amount {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-magenta);
        }

        /* Buttons */
        .btn {
            padding: 15px 30px;
            border: 2px solid var(--primary-cyan);
            background: transparent;
            color: var(--primary-cyan);
            font-family: 'Orbitron', monospace;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: var(--primary-cyan);
            color: #000;
            box-shadow: 0 0 30px var(--primary-cyan);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-magenta));
            border-color: transparent;
            color: #000;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px var(--primary-magenta);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 0.85rem;
        }

        .btn-close {
            padding: 8px 15px;
            font-size: 1.2rem;
            background: transparent;
            border: none;
        }

        /* Product Cards */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--primary-cyan);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            box-shadow: 0 0 40px var(--primary-cyan);
            transform: translateY(-10px);
            border-color: var(--primary-magenta);
        }

        .product-image {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .product-name {
            font-size: 1.3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .product-price {
            font-size: 1.8rem;
            color: var(--primary-magenta);
            margin-bottom: 15px;
            font-weight: 900;
        }

        .product-description {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Main Content */
        .main-content {
            margin-top: 120px;
            padding: 50px;
        }

        .hero {
            text-align: center;
            margin-bottom: 100px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary-cyan), var(--primary-magenta), #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .hero p {
            font-size: 1.3rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        /* Admin Panel */
        .admin-panel {
            background: var(--card-bg);
            border: 2px solid var(--primary-magenta);
            border-radius: 20px;
            padding: 50px;
            margin-bottom: 50px;
        }

        .admin-panel h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
        }

        #productForm {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--primary-cyan);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--primary-cyan);
            border-radius: 10px;
            color: var(--primary-cyan);
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 20px var(--primary-cyan);
            border-color: var(--primary-magenta);
        }

        /* Loading Screen */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0,255,255,0.3);
            border-top: 4px solid var(--primary-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        .loading-content p {
            margin-top: 20px;
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 20px;
                flex-direction: column;
                gap: 15px;
            }

            .cart-sidebar {
                width: 100%;
                right: -100%;
            }

            .main-content {
                margin-top: 200px;
                padding: 20px;
            }

            .logo-text {
                font-size: 1.3rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .nav-right {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
        }

        /* Hidden Elements */
        .hidden {
            display: none !important;
        }

        section {
            display: none;
        }

        section.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading" id="loading">
        <div class="loading-content">
            <div class="logo-icon" style="margin: 0 auto 20px;"><i class="fas fa-cube"></i></div>
            <div class="spinner"></div>
            <p>Initializing NeoStore...</p>
        </div>
    </div>

    <!-- Background Canvas -->
    <canvas id="bgCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3;"></canvas>

    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <div class="logo-icon"><i class="fas fa-store"></i></div>
            <div class="logo-text">NEO<span style="color: var(--primary-magenta);">STORE</span> PRO</div>
        </div>
        <div class="nav-right">
            <button class="btn" onclick="showSection('products')"><i class="fas fa-th"></i> Products</button>
            <button class="btn hidden" id="adminBtn" onclick="showSection('admin')"><i class="fas fa-plus"></i> Add Product</button>
            <div class="cart-badge">
                <button class="btn" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i> Cart
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
                <span id="userEmail"></span>
                <button class="btn btn-small" onclick="signOut()">Logout</button>
            </div>
            <button class="btn" id="loginBtn" onclick="showAuthModal()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
    </header>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-cart"></i> Your Cart</h2>
            <button class="btn btn-close" onclick="toggleCart()">×</button>
        </div>
        <div id="cartItems"></div>
        <div class="checkout-section">
            <div class="cart-total">
                <span class="cart-total-label">Total:</span>
                <span class="cart-total-amount" id="cartTotal">$0.00</span>
            </div>
            <button class="btn btn-primary" id="submitPayment" style="width: 100%; padding: 20px; font-size: 1.2rem;" onclick="handlePayment()">
                <i class="fas fa-credit-card"></i> Pay Now
            </button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal">
        <div class="auth-form">
            <h2>Welcome to NeoStore</h2>
            <form id="authForm" onsubmit="handleAuth(event)">
                <input type="email" id="authEmail" placeholder="Email" required>
                <input type="password" id="authPassword" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In / Sign Up</button>
            </form>
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="hideAuthModal()">Close</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Products Section -->
        <section id="products" class="active">
            <div class="hero">
                <h1>The Future of 3D Shopping</h1>
                <p>Experience premium products with photorealistic 3D models and secure Stripe payments</p>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </section>

        <!-- Admin Panel -->
        <section id="admin">
            <div class="admin-panel">
                <h2><i class="fas fa-rocket"></i> Launch New Product</h2>
                <form id="productForm" onsubmit="handleAddProduct(event)">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="productName" placeholder="e.g. Cyber Headphones X1" required>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" id="productPrice" placeholder="99.99" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="productDescription" placeholder="Product description..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Icon/Emoji</label>
                        <input type="text" id="productIcon" placeholder="e.g. 🎧" value="🛍️">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px;">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- JavaScript -->
    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        const firebaseConfig = {
            apiKey: "AIza_YOUR_API_KEY_HERE",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcd1234"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
        } catch (error) {
            console.log("Firebase already initialized or error:", error);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // STRIPE CONFIGURATION
        // ============================================
        const stripe = Stripe('pk_test_YOUR_PUBLIC_KEY_HERE');

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let currentUser = null;
        let cart = [];
        let products = [];

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async () => {
            setupAuthListener();
            await loadProducts();
            initializeCanvasBackground();
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        });

        // ============================================
        // AUTHENTICATION
        // ============================================
        function setupAuthListener() {
            auth.onAuthStateChanged(user => {
                currentUser = user;
                updateAuthUI();
                if (user) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    loadUserCart();
                } else {
                    document.getElementById('adminBtn').classList.add('hidden');
                }
            });
        }

        function updateAuthUI() {
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            
            if (currentUser) {
                userInfo.style.display = 'flex';
                loginBtn.style.display = 'none';
                document.getElementById('userEmail').textContent = currentUser.email;
            } else {
                userInfo.style.display = 'none';
                loginBtn.style.display = 'block';
            }
        }

        function showAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
        }

        function hideAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            
            try {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    console.log("Signed in successfully");
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        await auth.createUserWithEmailAndPassword(email, password);
                        console.log("Account created successfully");
                    } else {
                        throw error;
                    }
                }
                hideAuthModal();
                document.getElementById('authForm').reset();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function signOut() {
            auth.signOut();
        }

        // ============================================
        // PRODUCTS
        // ============================================
        async function loadProducts() {
            try {
                const snapshot = await db.collection('products').get();
                products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderProducts();
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; padding: 50px; opacity: 0.7;">No products yet. Admin can add products!</p>';
                return;
            }
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image" onclick="viewProduct('${product.id}')">${product.icon || '🛍️'}</div>
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-price">$${parseFloat(product.price).toFixed(2)}</p>
                    <p class="product-description">${product.description}</p>
                    <button class="btn btn-primary" style="width: 100%;" onclick="addToCart('${product.id}', '${product.name}', ${product.price})">
                        <i class="fas fa-cart-plus"></i> Add to Cart
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        async function handleAddProduct(event) {
            event.preventDefault();
            
            if (!currentUser) {
                alert('You must be logged in to add products');
                return;
            }
            
            const name = document.getElementById('productName').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDescription').value;
            const icon = document.getElementById('productIcon').value;
            
            try {
                await db.collection('products').add({
                    name: name,
                    price: price,
                    description: description,
                    icon: icon,
                    createdAt: new Date(),
                    createdBy: currentUser.uid
                });
                
                alert('Product added successfully!');
                document.getElementById('productForm').reset();
                await loadProducts();
                showSection('products');
            } catch (error) {
                alert('Error adding product: ' + error.message);
            }
        }

        function viewProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                alert(`${product.icon} ${product.name}\n\nPrice: $${parseFloat(product.price).toFixed(2)}\n\n${product.description}\n\n3D viewer would be implemented here with Three.js`);
            }
        }

        // ============================================
        // SHOPPING CART
        // ============================================
        function addToCart(productId, name, price) {
            const item = {
                id: productId,
                name: name,
                price: parseFloat(price),
                quantity: 1
            };
            
            const existingItem = cart.find(i => i.id === productId);
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push(item);
            }
            
            updateCartUI();
            saveCart();
            alert(`${name} added to cart!`);
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const cartCount = document.getElementById('cartCount');
            
            cartItems.innerHTML = '';
            let total = 0;
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="padding: 30px; text-align: center; opacity: 0.7;">Your cart is empty</p>';
                cartTotal.textContent = '$0.00';
                cartCount.textContent = '0';
                document.getElementById('submitPayment').style.opacity = '0.5';
                document.getElementById('submitPayment').disabled = true;
                return;
            }
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                itemElement.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <div class="cart-item-price">$${parseFloat(item.price).toFixed(2)}</div>
                        <div class="cart-item-controls">
                            <button class="btn btn-small" onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
                            <button class="btn btn-small" onclick="updateQuantity('${item.id}', 1)">+</button>
                            <button class="btn btn-small" style="margin-left: auto;" onclick="removeFromCart('${item.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                cartItems.appendChild(itemElement);
            });
            
            cartTotal.textContent = '$' + total.toFixed(2);
            cartCount.textContent = cart.length;
            document.getElementById('submitPayment').style.opacity = '1';
            document.getElementById('submitPayment').disabled = false;
        }

        function updateQuantity(productId, change) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                    saveCart();
                }
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            updateCartUI();
            saveCart();
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
        }

        function saveCart() {
            localStorage.setItem('neostore_cart', JSON.stringify(cart));
        }

        function loadUserCart() {
            const saved = localStorage.getItem('neostore_cart');
            if (saved) {
                try {
                    cart = JSON.parse(saved);
                    updateCartUI();
                } catch (error) {
                    console.error('Error loading cart:', error);
                }
            }
        }

        // ============================================
        // PAYMENT
        // ============================================
        async function handlePayment() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            
            if (!currentUser) {
                alert('Please login to checkout');
                showAuthModal();
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            if (confirm(`Process payment of $${total.toFixed(2)}?\n\nNote: This is a demo. Stripe test mode would be used in production.`)) {
                try {
                    await db.collection('orders').add({
                        userId: currentUser.uid,
                        items: cart,
                        total: total,
                        status: 'completed',
                        date: new Date(),
                        email: currentUser.email
                    });
                    
                    alert(`Payment successful! Order total: $${total.toFixed(2)}\n\nOrder saved to your account.`);
                    cart = [];
                    updateCartUI();
                    toggleCart();
                    saveCart();
                    showSection('products');
                } catch (error) {
                    alert('Error saving order: ' + error.message);
                }
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function showSection(sectionId) {
            document.querySelectorAll('section').forEach(section => {
                section.classList.remove('active');
            });
            
            const section = document.getElementById(sectionId);
            if (section) {
                section.classList.add('active');
            }
            
            document.getElementById('cartSidebar').classList.remove('open');
        }

        // ============================================
        // CANVAS BACKGROUND
        // ============================================
        function initializeCanvasBackground() {
            const canvas = document.getElementById('bgCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.size = Math.random() * 2;
                }
                
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                
                draw() {
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
                
                requestAnimationFrame(animate);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }
    </script>
</body>
</html>
